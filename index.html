<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kanban Pro - Premium Edition</title>
    <style>
        :root {
            /* Palette Light - Modern Slate */
            --bg-body: #f8fafc;
            --bg-sidebar: #0f172a;
            --bg-card: #ffffff;
            --bg-column: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --success: #10b981;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --sidebar-active: rgba(255, 255, 255, 0.1);
        }

        body.dark-theme {
            /* Palette Dark - Deep Ocean */
            --bg-body: #0f172a;
            --bg-sidebar: #020617;
            --bg-card: #1e293b;
            --bg-column: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 72px; 
            background: var(--bg-sidebar); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 24px 0; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100;
            border-right: 1px solid var(--border);
        }
        .sidebar.expanded { width: 220px; align-items: flex-start; }
        
        .nav-item { 
            width: 100%; 
            padding: 16px 24px; 
            color: #94a3b8; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            cursor: pointer; 
            border: none; 
            background: none; 
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .nav-item.active { 
            color: #fff; 
            background: var(--sidebar-active);
            box-shadow: inset 4px 0 0 var(--accent);
        }
        .nav-item:active { transform: scale(0.95); }
        
        .sidebar span { opacity: 0; white-space: nowrap; font-weight: 500; transition: opacity 0.3s; pointer-events: none; }
        .sidebar.expanded span { opacity: 1; pointer-events: auto; }

        /* --- CONTENT AREA --- */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            padding-bottom: 100px; /* Espaço para barra do iPhone */
        }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FORM --- */
        .card-form { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: var(--shadow); 
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .card-form input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 16px; 
            background: var(--bg-body); 
            color: var(--text-main);
            transition: border-color 0.2s;
        }
        .card-form input:focus { border-color: var(--accent); outline: none; }
        .btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: var(--success); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 16px; 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* --- KANBAN BOARD --- */
        .board { display: flex; flex-direction: column; gap: 16px; }
        .col { 
            background: var(--bg-column); 
            border-radius: 18px; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        .col-header { 
            padding: 16px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 700; 
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .col.collapsed .items { display: none; }
        .items { padding: 12px; min-height: 80px; }

        /* --- CARDS --- */
        .card { 
            background: var(--bg-card); 
            padding: 16px; 
            border-radius: 14px; 
            margin-bottom: 12px; 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border);
            position: relative; 
            touch-action: none; 
            transition: transform 0.2s;
        }
        .card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--text-main); }
        .card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }
        .date-group { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
        .date-label { font-size: 0.65rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        .ghost { 
            position: fixed; pointer-events: none; z-index: 9999; opacity: 0.9; 
            background: var(--bg-card); padding: 16px; border-radius: 14px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 2px solid var(--accent); 
        }

        /* --- ACCORDION --- */
        .acc-item { 
            background: var(--bg-card); 
            border-radius: 14px; 
            margin-bottom: 12px; 
            overflow: hidden; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .acc-head { padding: 18px; display: flex; justify-content: space-between; cursor: pointer; font-weight: 700; font-size: 1rem; }
        .acc-body { padding: 0; max-height: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.02); overflow: hidden; }
        .acc-item.open .acc-body { padding: 20px; max-height: 1200px; }

        /* --- CHECKLIST --- */
        .check-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .check-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }
        .check-text { font-size: 0.95rem; color: var(--text-main); }
        .check-text.done { text-decoration: line-through; color: var(--text-muted); opacity: 0.5; }

        .btn-action { 
            padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.75rem; 
            font-weight: 700; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-action:active { opacity: 0.7; }

        /* --- ICONS --- */
        .icon-btn { background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <button class="nav-item" onclick="app.toggleSidebar()" style="color: white; font-size: 1.4rem;">☰</button>
        <button class="nav-item active" id="btn-kanban" onclick="app.view('kanban')">📊 <span>Acompanhamento</span></button>
        <button class="nav-item" id="btn-details" onclick="app.view('details')">📝 <span>Detalhes</span></button>
        <button class="nav-item" id="btn-done" onclick="app.view('done')">✅ <span>Concluídas</span></button>
        <button class="nav-item" onclick="app.toggleTheme()" style="margin-top: auto;">🌙 <span>Tema</span></button>
        <button class="nav-item" onclick="app.exportData()">💾 <span>Backup</span></button>
    </nav>

    <main class="content">
        <!-- PÁGINA: ACOMPANHAMENTO -->
        <section id="page-kanban" class="page active">
            <div class="card-form">
                <input type="text" id="in-name" placeholder="Nome da Atividade">
                <input type="text" id="in-req" placeholder="Solicitante">
                <button class="btn-primary" onclick="app.addTask()">Adicionar Atividade +</button>
            </div>
            <div class="board">
                <div class="col" id="col-Espera" data-status="Espera">
                    <div class="col-header">📋 Espera <button class="icon-btn" onclick="app.toggleCol('Espera')">▾</button></div>
                    <div class="items"></div>
                </div>
                <div class="col" id="col-Andamento" data-status="Andamento">
                    <div class="col-header">⏳ Andamento <button class="icon-btn" onclick="app.toggleCol('Andamento')">▾</button></div>
                    <div class="items"></div>
                </div>
                <div class="col" id="col-Validacao" data-status="Validacao">
                    <div class="col-header">👁️ Validação <button class="icon-btn" onclick="app.toggleCol('Validacao')">▾</button></div>
                    <div class="items"></div>
                </div>
                <div class="col" id="col-Concluido" data-status="Concluido">
                    <div class="col-header">✅ Concluído <button class="icon-btn" onclick="app.toggleCol('Concluido')">▾</button></div>
                    <div class="items"></div>
                </div>
            </div>
        </section>

        <!-- PÁGINA: DETALHES -->
        <section id="page-details" class="page">
            <h3 style="margin-bottom:20px; font-weight: 800; letter-spacing: -0.5px;">Checklist e Etapas</h3>
            <div id="list-details"></div>
        </section>

        <!-- PÁGINA: CONCLUÍDAS -->
        <section id="page-done" class="page">
            <h3 style="margin-bottom:20px; font-weight: 800; letter-spacing: -0.5px;">Histórico de Concluídas</h3>
            <div id="list-done"></div>
        </section>
    </main>

    <script>
        // --- LÓGICA MANTIDA INTEGRALMENTE ---
        const app = {
            STORAGE_KEY: 'KANBAN_ULTIMATE_DATA',
            tasks: [],
            theme: 'light',
            collapsed: [],
            openDetailId: null,
            ghost: null,

            init: function() {
                try {
                    this.tasks = JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || [];
                    this.theme = localStorage.getItem('kanban_theme_pref') || 'light';
                    this.collapsed = JSON.parse(localStorage.getItem('kanban_cols_pref')) || [];
                } catch(e) { this.tasks = []; }

                if(this.theme === 'dark') document.body.classList.add('dark-theme');
                this.render();
            },

            save: function() {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.tasks));
                localStorage.setItem('kanban_theme_pref', this.theme);
                localStorage.setItem('kanban_cols_pref', JSON.stringify(this.collapsed));
            },

            exportData: function() {
                const data = JSON.stringify(this.tasks);
                prompt("Copie seu backup:", data);
            },

            view: function(v) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                document.getElementById('page-' + v).classList.add('active');
                document.getElementById('btn-' + v).classList.add('active');
                this.render();
            },

            toggleSidebar: function() { document.getElementById('sidebar').classList.toggle('expanded'); },

            toggleTheme: function() {
                document.body.classList.toggle('dark-theme');
                this.theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
                this.save();
            },

            toggleCol: function(id) {
                const el = document.getElementById('col-' + id);
                el.classList.toggle('collapsed');
                this.save();
            },

            addTask: function() {
                const name = document.getElementById('in-name').value;
                const req = document.getElementById('in-req').value;
                if(!name || !req) return;

                this.tasks.push({
                    id: 'id' + Date.now(),
                    name: name,
                    req: req,
                    status: 'Espera',
                    notes: '',
                    checklist: [],
                    hidden: false,
                    dateC: new Date().toLocaleString('pt-BR'),
                    dateS: null, dateV: null, dateF: null
                });
                document.getElementById('in-name').value = '';
                document.getElementById('in-req').value = '';
                this.save(); this.render();
            },

            render: function() {
                this.renderKanban();
                this.renderDetails();
                this.renderDone();
            },

            renderKanban: function() {
                document.querySelectorAll('.items').forEach(c => c.innerHTML = '');
                this.tasks.forEach(t => {
                    if(t.status === 'Concluido' && t.hidden) return;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h4>${t.name}</h4>
                        <p>👤 ${t.req}</p>
                        <div class="date-group">
                            <span class="date-label">📅 Pedido: ${t.dateC}</span>
                            ${t.dateS ? `<span class="date-label">⏳ Início: ${t.dateS}</span>` : ''}
                            ${t.dateV ? `<span class="date-label">👁️ Val: ${t.dateV}</span>` : ''}
                            ${t.dateF ? `<span class="date-label">✅ Fim: ${t.dateF}</span>` : ''}
                        </div>
                    `;
                    if(t.status === 'Concluido') {
                        card.innerHTML += `<button class="btn-action" style="background:#94a3b8;color:white;width:100%;margin-top:12px" onclick="app.hideTask('${t.id}')">Ocultar do Quadro</button>`;
                    }
                    this.setupDrag(card, t.id);
                    const col = document.querySelector('#col-' + t.status + ' .items');
                    if(col) col.appendChild(card);
                });
            },

            hideTask: function(id) {
                this.tasks.find(t => t.id === id).hidden = true;
                this.save(); this.render();
            },

            setupDrag: function(el, id) {
                const self = this;
                el.ontouchstart = function(e) {
                    if(e.target.tagName === 'BUTTON') return;
                    const touch = e.touches[0];
                    self.ghost = el.cloneNode(true);
                    self.ghost.className = 'ghost';
                    self.ghost.style.width = el.offsetWidth + 'px';
                    document.body.appendChild(self.ghost);
                    el.classList.add('dragging');
                    self.moveGhost(touch.clientX, touch.clientY);
                };
                el.ontouchmove = function(e) {
                    if(!self.ghost) return;
                    e.preventDefault();
                    self.moveGhost(e.touches[0].clientX, e.touches[0].clientY);
                };
                el.ontouchend = function(e) {
                    if(!self.ghost) return;
                    const touch = e.changedTouches[0];
                    self.ghost.style.display = 'none';
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    const col = target?.closest('.col');
                    if(col) self.moveLogic(id, col.dataset.status);
                    document.body.removeChild(self.ghost);
                    self.ghost = null;
                    el.classList.remove('dragging');
                };
            },

            moveGhost: function(x, y) {
                this.ghost.style.left = (x - 50) + 'px';
                this.ghost.style.top = (y - 50) + 'px';
            },

            moveLogic: function(id, status) {
                const t = this.tasks.find(x => x.id === id);
                const now = new Date().toLocaleString('pt-BR');
                if(status === 'Andamento' && !t.dateS) t.dateS = now;
                if(status === 'Validacao') t.dateV = now;
                if(status === 'Concluido') { t.dateF = now; t.hidden = false; }
                t.status = status;
                this.save(); this.render();
            },

            renderDetails: function() {
                const cont = document.getElementById('list-details');
                cont.innerHTML = '';
                this.tasks.filter(t => t.status !== 'Concluido').forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'acc-item' + (this.openDetailId === t.id ? ' open' : '');
                    div.innerHTML = `
                        <div class="acc-head" onclick="app.toggleAccordion('${t.id}')">${t.name} ▾</div>
                        <div class="acc-body">
                            <div style="display:flex;gap:8px;margin-bottom:15px">
                                <input type="text" id="step-${t.id}" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-body);color:var(--text-main)" placeholder="Nova etapa...">
                                <button class="btn-action" style="background:var(--accent);color:white;padding:0 20px" onclick="app.addStep('${t.id}')">Add</button>
                            </div>
                            <div id="steps-${t.id}">${this.renderSteps(t)}</div>
                            <textarea style="width:100%;height:80px;margin-top:15px;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-body);color:var(--text-main)" onchange="app.upNotes('${t.id}', this.value)" placeholder="Notas gerais...">${t.notes}</textarea>
                        </div>
                    `;
                    cont.appendChild(div);
                });
            },

            toggleAccordion: function(id) {
                this.openDetailId = (this.openDetailId === id) ? null : id;
                this.renderDetails();
            },

            renderSteps: function(t) {
                return t.checklist.map((s, i) => `
                    <div class="check-row">
                        <input type="checkbox" ${s.done?'checked':''} onchange="app.togStep('${t.id}',${i})">
                        <span class="check-text ${s.done?'done':''}">${s.text}</span>
                    </div>
                `).join('');
            },

            addStep: function(id) {
                const inp = document.getElementById('step-' + id);
                if(!inp.value) return;
                this.tasks.find(t => t.id === id).checklist.push({text: inp.value, done: false});
                this.save(); this.renderDetails();
            },

            togStep: function(id, i) {
                const t = this.tasks.find(x => x.id === id);
                t.checklist[i].done = !t.checklist[i].done;
                this.save(); this.renderDetails();
            },

            upNotes: function(id, v) { this.tasks.find(t => t.id === id).notes = v; this.save(); },

            renderDone: function() {
                const cont = document.getElementById('list-done');
                cont.innerHTML = '';
                this.tasks.filter(t => t.status === 'Concluido').forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'acc-item';
                    div.innerHTML = `
                        <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">✅ ${t.name}</div>
                        <div class="acc-body">
                            <div style="font-size:0.8rem; margin-bottom:15px; line-height:1.6; color: var(--text-muted)">
                                <b>Histórico Completo:</b><br>
                                • Pedido: ${t.dateC}<br>
                                • Início: ${t.dateS || '---'}<br>
                                • Validação: ${t.dateV || '---'}<br>
                                • Finalizado: ${t.dateF || '---'}
                            </div>
                            <div style="margin-bottom:15px">
                                <b>Etapas Realizadas:</b><br>
                                ${t.checklist.length > 0 ? this.renderSteps(t) : '<small>Nenhuma etapa registrada.</small>'}
                            </div>
                            <button class="btn-primary" style="background:#f59e0b" onclick="app.resetTask('${t.id}')">Reiniciar Fluxo</button>
                            <button class="btn-primary" style="background:#ef4444;margin-top:8px" onclick="app.delTask('${t.id}')">Excluir Permanente
