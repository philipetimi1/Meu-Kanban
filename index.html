<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanban Pro System</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-sidebar: #2c3e50;
            --bg-card: #ffffff;
            --bg-column: #ebedef;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-color: #3498db;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-sidebar: #000000;
            --bg-card: #1e1e1e;
            --bg-column: #252525;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR (RECOLHIDA) --- */
        .sidebar {
            width: 70px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            transition: width 0.3s ease;
            z-index: 1000;
        }
        .sidebar.expanded { width: 200px; align-items: flex-start; }
        .nav-btn {
            background: none; border: none; color: #bdc3c7; padding: 18px 20px;
            cursor: pointer; width: 100%; display: flex; align-items: center; gap: 15px;
        }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar span { display: none; white-space: nowrap; font-size: 0.9rem; font-weight: 600; }
        .sidebar.expanded span { display: inline; }

        /* --- CONTEÚDO --- */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- FORMULÁRIO --- */
        .task-form { background: var(--bg-card); padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .task-form input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 8px;
            background: var(--bg-body); color: var(--text-main); font-size: 16px;
        }
        .btn-add { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; }

        /* --- COLUNAS --- */
        .kanban-board { display: flex; flex-direction: column; gap: 12px; }
        .column { background: var(--bg-column); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .column-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.03); }
        .column.collapsed .card-container { display: none; }
        .card-container { padding: 10px; min-height: 60px; }

        /* --- CARDS --- */
        .card {
            background: var(--bg-card); padding: 12px; border-radius: 10px; margin-bottom: 10px;
            box-shadow: var(--shadow); border-left: 4px solid var(--accent-color);
            position: relative; touch-action: none;
        }
        .card.is-dragging { opacity: 0.5; transform: scale(0.95); }
        .card-ghost { position: fixed; pointer-events: none; z-index: 9999; width: 250px; opacity: 0.9; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transform: rotate(3deg); background: var(--bg-card); padding: 10px; border-radius: 10px; }
        .card h4 { font-size: 0.95rem; margin-bottom: 3px; }
        .card p { font-size: 0.8rem; color: var(--text-muted); }
        .date-badge { font-size: 0.6rem; display: block; opacity: 0.7; margin-top: 2px; }

        /* --- CHECKLIST (DETALHES) --- */
        .checklist-container { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .checklist-item input[type="checkbox"] { width: 18px; height: 18px; }
        .checklist-text { font-size: 0.9rem; transition: 0.2s; }
        .checklist-text.completed { text-decoration: line-through; color: var(--text-muted); opacity: 0.6; }
        .step-input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .step-input-group input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }

        /* --- LISTAS (DETALHES E CONCLUÍDOS) --- */
        .accordion-item { background: var(--bg-card); border-radius: 10px; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .accordion-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .accordion-body { padding: 0; max-height: 0; transition: 0.3s; background: var(--bg-body); overflow: hidden; }
        .accordion-item.open .accordion-body { padding: 15px; max-height: 1000px; overflow-y: auto; }

        /* --- UTILS --- */
        .btn-small { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.75rem; }
        .btn-reset { background: #e67e22; color: white; }
        .btn-hide { background: #95a5a6; color: white; margin-top: 5px; width: 100%; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: var(--bg-card); padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="color: white;">☰</button>
        <button class="nav-btn active" id="nav-kanban" onclick="switchView('kanban')">📊 <span>Acompanhamento</span></button>
        <button class="nav-btn" id="nav-list" onclick="switchView('list')">📝 <span>Detalhes</span></button>
        <button class="nav-btn" id="nav-done" onclick="switchView('done')">✅ <span>Concluídas</span></button>
        <button class="nav-btn" onclick="toggleTheme()" style="margin-top: auto;">🌙 <span>Tema</span></button>
    </aside>

    <main class="main-content">
        <!-- ABA ACOMPANHAMENTO -->
        <section id="kanban-view" class="view-section active">
            <form class="task-form" id="taskForm">
                <input type="text" id="taskName" placeholder="Nome da Atividade" required>
                <input type="text" id="taskReq" placeholder="Solicitante" required>
                <button type="submit" class="btn-add">Adicionar +</button>
            </form>

            <div class="kanban-board">
                <div class="column" id="col-Espera" data-status="Espera">
                    <div class="column-header"><div class="column-title">📋 Espera</div><button onclick="toggleColumn('Espera')" class="toggle-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
                <div class="column" id="col-Andamento" data-status="Andamento">
                    <div class="column-header"><div class="column-title">⏳ Andamento</div><button onclick="toggleColumn('Andamento')" class="toggle-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
                <div class="column" id="col-Validacao" data-status="Validacao">
                    <div class="column-header"><div class="column-title">👁️ Validação</div><button onclick="toggleColumn('Validacao')" class="toggle-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
                <div class="column" id="col-Concluido" data-status="Concluido">
                    <div class="column-header"><div class="column-title">✅ Concluído</div><button onclick="toggleColumn('Concluido')" class="toggle-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
            </div>
        </section>

        <!-- ABA DETALHES -->
        <section id="list-view" class="view-section">
            <h3 style="margin-bottom:15px">Etapas e Detalhes</h3>
            <div id="accordionList"></div>
        </section>

        <!-- ABA CONCLUÍDAS -->
        <section id="done-view" class="view-section">
            <h3 style="margin-bottom:15px">Histórico de Concluídas</h3>
            <div id="doneList"></div>
        </section>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('k_tasks_v4')) || [];
        let theme = localStorage.getItem('k_theme') || 'light';
        let collapsedCols = JSON.parse(localStorage.getItem('k_collapsed')) || [];

        function init() {
            if (theme === 'dark') document.body.classList.add('dark-theme');
            renderKanban();
        }

        // --- NAVEGAÇÃO ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
            localStorage.setItem('k_theme', theme);
        }
        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            document.getElementById('nav-' + v).classList.add('active');
            if(v === 'list') renderDetails();
            if(v === 'done') renderDone();
            if(v === 'kanban') renderKanban();
        }

        // --- LÓGICA DE TAREFAS ---
        document.getElementById('taskForm').onsubmit = function(e) {
            e.preventDefault();
            const t = {
                id: 't' + Date.now(),
                name: document.getElementById('taskName').value,
                req: document.getElementById('taskReq').value,
                status: 'Espera',
                notes: '',
                checklist: [],
                hiddenOnBoard: false,
                dateCreated: new Date().toLocaleString('pt-BR'),
                dateStarted: null, dateValidated: null, dateFinished: null
            };
            tasks.push(t);
            save(); renderKanban(); this.reset();
        };

        function save() { localStorage.setItem('k_tasks_v4', JSON.stringify(tasks)); }

        // --- RENDER ACOMPANHAMENTO (KANBAN) ---
        function renderKanban() {
            document.querySelectorAll('.card-container').forEach(c => c.innerHTML = '');
            tasks.forEach(t => {
                if (t.status === 'Concluido' && t.hiddenOnBoard) return;

                const card = document.createElement('div');
                card.className = 'card';
                card.id = t.id;
                card.innerHTML = `
                    <h4>${t.name}</h4>
                    <p>👤 ${t.req}</p>
                    <span class="date-badge">📅 ${t.dateCreated}</span>
                    ${t.status === 'Concluido' ? `<button class="btn-small btn-hide" onclick="hideFromBoard('${t.id}')">Ocultar do Quadro</button>` : ''}
                `;
                setupTouchEvents(card);
                const container = document.querySelector(`#col-${t.status} .card-container`);
                if (container) container.appendChild(card);
            });
        }

        function hideFromBoard(id) {
            tasks.find(t => t.id === id).hiddenOnBoard = true;
            save(); renderKanban();
        }

        // --- RENDER DETALHES (CHECKLIST) ---
        function renderDetails() {
            const cont = document.getElementById('accordionList');
            cont.innerHTML = '';
            // Filtra apenas as que NÃO estão concluídas para focar no trabalho
            tasks.filter(t => t.status !== 'Concluido').forEach(t => {
                const item = document.createElement('div');
                item.className = 'accordion-item';
                item.innerHTML = `
                    <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
                        <span><b>${t.name}</b></span>
                        <span>${t.status} ▾</span>
                    </div>
                    <div class="accordion-body">
                        <div class="step-input-group">
                            <input type="text" id="step-${t.id}" placeholder="Nova etapa...">
                            <button class="btn-small" style="background:var(--accent-color);color:white" onclick="addStep('${t.id}')">+</button>
                        </div>
                        <div class="checklist-container" id="check-cont-${t.id}">
                            ${renderChecklist(t)}
                        </div>
                        <textarea style="width:100%;height:60px;margin-top:15px;padding:8px;border-radius:5px" onchange="updateNotes('${t.id}', this.value)" placeholder="Notas gerais...">${t.notes}</textarea>
                    </div>
                `;
                cont.appendChild(item);
            });
        }

        function renderChecklist(task) {
            return task.checklist.map((step, index) => `
                <div class="checklist-item">
                    <input type="checkbox" ${step.done ? 'checked' : ''} onchange="toggleStep('${task.id}', ${index})">
                    <span class="checklist-text ${step.done ? 'completed' : ''}">${step.text}</span>
                </div>
            `).join('');
        }

        function addStep(id) {
            const input = document.getElementById('step-' + id);
            if (!input.value) return;
            tasks.find(t => t.id === id).checklist.push({ text: input.value, done: false });
            input.value = ''; save(); renderDetails();
        }

        function toggleStep(taskId, stepIndex) {
            const task = tasks.find(t => t.id === taskId);
            task.checklist[stepIndex].done = !task.checklist[stepIndex].done;
            save(); renderDetails();
        }

        function updateNotes(id, val) { tasks.find(t => t.id === id).notes = val; save(); }

        // --- RENDER CONCLUÍDAS ---
        function renderDone() {
            const cont = document.getElementById('doneList');
            cont.innerHTML = '';
            tasks.filter(t => t.status === 'Concluido').forEach(t => {
                const item = document.createElement('div');
                item.className = 'accordion-item';
                item.innerHTML = `
                    <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
                        <span>✅ ${t.name}</span>
                        <small>${t.dateFinished}</small>
                    </div>
                    <div class="accordion-body">
                        <p><small>Solicitante: ${t.req}</small></p>
                        <p><small>Criado em: ${t.dateCreated}</small></p>
                        <p><small>Finalizado em: ${t.dateFinished}</small></p>
                        <div style="margin:10px 0; padding:10px; background:#eee; border-radius:5px; font-size:0.8rem">
                            <b>Notas:</b> ${t.notes || 'Sem notas.'}
                        </div>
                        <button class="btn-small btn-reset" onclick="resetTask('${t.id}')">Reiniciar Fluxo (Voltar para Espera)</button>
                    </div>
                `;
                cont.appendChild(item);
            });
        }

        function resetTask(id) {
            const t = tasks.find(
