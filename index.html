<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanban Pro System</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-sidebar: #2c3e50;
            --bg-card: #ffffff;
            --bg-column: #ebedef;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-color: #3498db;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-sidebar: #000000;
            --bg-card: #1e1e1e;
            --bg-column: #252525;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR (INICIA RECOLHIDA) --- */
        .sidebar {
            width: 70px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            transition: width 0.3s ease;
            z-index: 1000;
        }
        .sidebar.expanded { width: 200px; align-items: flex-start; }
        .nav-btn {
            background: none; border: none; color: #bdc3c7; padding: 18px 20px;
            cursor: pointer; width: 100%; display: flex; align-items: center; gap: 15px;
        }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar span { display: none; white-space: nowrap; font-size: 0.9rem; font-weight: 600; }
        .sidebar.expanded span { display: inline; }

        /* --- CONTEÚDO --- */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- FORMULÁRIO --- */
        .task-form { background: var(--bg-card); padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .task-form input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 8px;
            background: var(--bg-body); color: var(--text-main); font-size: 16px;
        }
        .btn-add { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- COLUNAS --- */
        .kanban-board { display: flex; flex-direction: column; gap: 12px; }
        .column { background: var(--bg-column); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .column-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.03); }
        .column.collapsed .card-container { display: none; }
        .card-container { padding: 10px; min-height: 60px; }

        /* --- CARDS --- */
        .card {
            background: var(--bg-card); padding: 12px; border-radius: 10px; margin-bottom: 10px;
            box-shadow: var(--shadow); border-left: 4px solid var(--accent-color);
            position: relative; touch-action: none;
        }
        .card.is-dragging { opacity: 0.3; }
        .card-ghost { 
            position: fixed; pointer-events: none; z-index: 9999; 
            width: 250px; opacity: 0.9; box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
            background: var(--bg-card); padding: 10px; border-radius: 10px; border-left: 4px solid var(--accent-color);
        }
        .card h4 { font-size: 0.95rem; margin-bottom: 3px; }
        .card p { font-size: 0.8rem; color: var(--text-muted); }
        .date-badge { font-size: 0.6rem; display: block; opacity: 0.7; margin-top: 2px; }

        /* --- CHECKLIST --- */
        .checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .checklist-text { font-size: 0.9rem; }
        .checklist-text.completed { text-decoration: line-through; color: var(--text-muted); opacity: 0.6; }
        .step-input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .step-input-group input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; background: var(--bg-body); color: var(--text-main); }

        /* --- ACORDEÃO --- */
        .accordion-item { background: var(--bg-card); border-radius: 10px; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .accordion-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .accordion-body { padding: 0; max-height: 0; transition: 0.3s ease-out; background: var(--bg-body); overflow: hidden; }
        .accordion-item.open .accordion-body { padding: 15px; max-height: 1000px; overflow-y: auto; }

        .btn-small { padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .btn-reset { background: #e67e22; color: white; width: 100%; margin-top: 10px; }
        .btn-hide { background: #95a5a6; color: white; margin-top: 8px; width: 100%; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="color: white;">☰</button>
        <button class="nav-btn active" id="nav-kanban" onclick="switchView('kanban')">📊 <span>Acompanhamento</span></button>
        <button class="nav-btn" id="nav-list" onclick="switchView('list')">📝 <span>Detalhes</span></button>
        <button class="nav-btn" id="nav-done" onclick="switchView('done')">✅ <span>Concluídas</span></button>
        <button class="nav-btn" onclick="toggleTheme()" style="margin-top: auto;">🌙 <span>Tema</span></button>
    </aside>

    <main class="main-content">
        <!-- ACOMPANHAMENTO -->
        <section id="kanban-view" class="view-section active">
            <form class="task-form" id="taskForm">
                <input type="text" id="taskName" placeholder="Nome da Atividade" required>
                <input type="text" id="taskReq" placeholder="Solicitante" required>
                <button type="submit" class="btn-add">Adicionar +</button>
            </form>

            <div class="kanban-board">
                <div class="column" id="col-Espera" data-status="Espera">
                    <div class="column-header"><b>📋 Espera</b><button onclick="toggleCol('Espera')" class="t-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
                <div class="column" id="col-Andamento" data-status="Andamento">
                    <div class="column-header"><b>⏳ Andamento</b><button onclick="toggleCol('Andamento')" class="t-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
                <div class="column" id="col-Validacao" data-status="Validacao">
                    <div class="column-header"><b>👁️ Validação</b><button onclick="toggleCol('Validacao')" class="t-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
                <div class="column" id="col-Concluido" data-status="Concluido">
                    <div class="column-header"><b>✅ Concluído</b><button onclick="toggleCol('Concluido')" class="t-btn">▲</button></div>
                    <div class="card-container"></div>
                </div>
            </div>
        </section>

        <!-- DETALHES -->
        <section id="list-view" class="view-section">
            <h3 style="margin-bottom:15px">Etapas e Checklists</h3>
            <div id="accordionList"></div>
        </section>

        <!-- CONCLUÍDAS -->
        <section id="done-view" class="view-section">
            <h3 style="margin-bottom:15px">Histórico Finalizado</h3>
            <div id="doneList"></div>
        </section>
    </main>

    <script>
        // --- ESTADO ---
        let tasks = JSON.parse(localStorage.getItem('k_v5_data')) || [];
        let theme = localStorage.getItem('k_v5_theme') || 'light';
        let collapsedCols = JSON.parse(localStorage.getItem('k_v5_cols')) || [];

        // --- INICIALIZAÇÃO ---
        function init() {
            if (theme === 'dark') document.body.classList.add('dark-theme');
            renderKanban();
            collapsedCols.forEach(id => {
                const el = document.getElementById('col-' + id);
                if(el) { el.classList.add('collapsed'); el.querySelector('.t-btn').innerText = '▼'; }
            });
        }

        function save() { localStorage.setItem('k_v5_data', JSON.stringify(tasks)); }

        // --- NAVEGAÇÃO ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
            localStorage.setItem('k_v5_theme', theme);
        }
        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            document.getElementById('nav-' + v).classList.add('active');
            if(v === 'kanban') renderKanban();
            if(v === 'list') renderDetails();
            if(v === 'done') renderDone();
        }

        // --- TAREFAS ---
        document.getElementById('taskForm').onsubmit = function(e) {
            e.preventDefault();
            const t = {
                id: 't' + Date.now(),
                name: document.getElementById('taskName').value,
                req: document.getElementById('taskReq').value,
                status: 'Espera',
                notes: '',
                checklist: [],
                hidden: false,
                dateC: new Date().toLocaleString('pt-BR'),
                dateS: null, dateV: null, dateF: null
            };
            tasks.push(t); save(); renderKanban(); this.reset();
        };

        function renderKanban() {
            document.querySelectorAll('.card-container').forEach(c => c.innerHTML = '');
            tasks.forEach(t => {
                if (t.status === 'Concluido' && t.hidden) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.id = t.id;
                card.innerHTML = `
                    <h4>${t.name}</h4>
                    <p>👤 ${t.req}</p>
                    <span class="date-badge">📅 ${t.dateC}</span>
                    ${t.status === 'Concluido' ? `<button class="btn-small btn-hide" onclick="hideTask('${t.id}')">Ocultar do Quadro</button>` : ''}
                `;
                setupDrag(card);
                const col = document.querySelector('#col-' + t.status + ' .card-container');
                if(col) col.appendChild(card);
            });
        }

        function hideTask(id) { tasks.find(t => t.id === id).hidden = true; save(); renderKanban(); }

        // --- DRAG AND DROP (TOUCH) ---
        let ghost = null;
        function setupDrag(card) {
            card.ontouchstart = function(e) {
                if(e.target.tagName === 'BUTTON') return;
                const touch = e.touches[0];
                ghost = card.cloneNode(true);
                ghost.className = 'card-ghost';
                ghost.style.width = card.offsetWidth + 'px';
                document.body.appendChild(ghost);
                card.classList.add('is-dragging');
                moveGhost(touch.clientX, touch.clientY);
            };
            card.ontouchmove = function(e) {
                if(!ghost) return;
                e.preventDefault();
                moveGhost(e.touches[0].clientX, e.touches[0].clientY);
            };
            card.ontouchend = function(e) {
                if(!ghost) return;
                const touch = e.changedTouches[0];
                // Remove ghost temporariamente para detectar o que está embaixo
                ghost.style.display = 'none';
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                const col = target?.closest('.column');
                ghost.style.display = 'block';

                if(col) moveLogic(card.id, col.dataset.status);
                
                document.body.removeChild(ghost);
                ghost = null;
                card.classList.remove('is-dragging');
            };
        }
        function moveGhost(x, y) { ghost.style.left = (x - 50) + 'px'; ghost.style.top = (y - 50) + 'px'; }

        function moveLogic(id, newStatus) {
            const t = tasks.find(x => x.id === id);
            const now = new Date().toLocaleString('pt-BR');
            if(newStatus === 'Andamento' && !t.dateS) t.dateS = now;
            if(newStatus === 'Validacao') t.dateV = now;
            if(newStatus === 'Concluido') { t.dateF = now; t.hidden = false; }
            t.status = newStatus;
            save(); renderKanban();
        }

        // --- DETALHES (CHECKLIST) ---
        function renderDetails() {
            const cont = document.getElementById('accordionList');
            cont.innerHTML = '';
            tasks.filter(t => t.status !== 'Concluido').forEach(t => {
                const item = document.createElement('div');
                item.className = 'accordion-item';
                item.innerHTML = `
                    <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
                        <b>${t.name}</b><span>${t.status} ▾</span>
                    </div>
                    <div class="accordion-body">
                        <div class="step-input-group">
                            <input type="text" id="in-${t.id}" placeholder="Nova etapa...">
                            <button class="btn-small" style="background:#3498db;color:white" onclick="addStep('${t.id}')">+</button>
                        </div>
                        <div id="list-${t.id}">${renderSteps(t)}</div>
                        <textarea style="width:100%;height:60px;margin-top:10px;padding:8px" onchange="upNotes('${t.id}', this.value)" placeholder="Notas...">${t.notes}</textarea>
                    </div>
                `;
                cont.appendChild(item);
            });
        }

        function renderSteps(t) {
            return t.checklist.map((s, i) => `
                <div class="checklist-item">
                    <input type="checkbox" ${s.done?'checked':''} onchange="togStep('${t.id}',${i})">
                    <span class="checklist-text ${s.done?'completed':''}">${s.text}</span>
                </div>
            `).join('');
        }

        function addStep(id) {
            const inp = document.getElementById('in-' + id);
            if(!inp.value) return;
            tasks.find(t => t.id === id).checklist.push({text: inp.value, done: false});
            inp.value = ''; save(); renderDetails();
        }

        function togStep(tid, i) { tasks.find(t => t.id === tid).checklist[i].done = !tasks.find(t => t.id === tid).checklist[i].done; save(); renderDetails(); }
        function upNotes(id, v) { tasks.find(t => t.id === id).notes = v; save(); }

        // --- CONCLUÍDAS ---
        function renderDone() {
            const cont = document.getElementById('doneList');
            cont.innerHTML = '';
            tasks.filter(t => t.status === 'Concluido').forEach(t => {
                const item = document.createElement('div');
                item.className = 'accordion-item';
                item.innerHTML = `
                    <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
                        <b>✅ ${t.name}</b><small>${t.dateF}</small>
                    </div>
                    <div class="accordion-body">
                        <p><small>Solicitante: ${t.req}</small></p>
                        <p><small>Início: ${t.dateS || 'N/A'} | Validação: ${t.dateV || 'N/A'}</small></p>
                        <div style="background:#eee;padding:10px;margin:10px 0;border-radius:5px;font-size:0.8rem">${t.notes || 'Sem notas.'}</div>
                        <button class="btn-small btn-reset" onclick="resetTask('${t.id}')">Reiniciar Fluxo</button>
                    </div>
                `;
                cont.appendChild(item);
            });
        }

        function resetTask(id) {
            const t = tasks.find(x => x.id === id);
            t.status = 'Espera'; t.hidden = false; t.dateS = t.dateV = t.dateF = null;
            save(); switchView('kanban');
        }

        function toggleCol(id) {
            const el = document.getElementById('col-' + id);
            const isC = el.classList.toggle('collapsed');
            el.querySelector('.t-btn').innerText = isC ? '▼' : '▲';
            if(isC) collapsedCols.push(id); else collapsedCols = collapsedCols.filter(x => x !== id);
            localStorage.setItem('k_v5_cols', JSON.stringify(collapsedCols));
        }

        init();
    </script>
</body>
</html>
