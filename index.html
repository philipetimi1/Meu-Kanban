<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanban Pro Mobile Drag</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-sidebar: #2c3e50;
            --bg-card: #ffffff;
            --bg-column: #ebedef;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-color: #3498db;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-sidebar: #000000;
            --bg-card: #1e1e1e;
            --bg-column: #252525;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR (RECOLHIDA) --- */
        .sidebar {
            width: 70px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            transition: width 0.3s ease;
            z-index: 1000;
        }
        .sidebar.expanded { width: 200px; align-items: flex-start; }
        .nav-btn {
            background: none; border: none; color: #bdc3c7; padding: 20px;
            cursor: pointer; width: 100%; display: flex; align-items: center; gap: 15px;
        }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar span { display: none; white-space: nowrap; font-weight: 600; }
        .sidebar.expanded span { display: inline; }

        /* --- CONTEÚDO --- */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- FORMULÁRIO --- */
        .task-form {
            background: var(--bg-card);
            padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 20px;
        }
        .task-form input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 8px;
            background: var(--bg-body); color: var(--text-main); font-size: 16px;
        }
        .btn-add {
            width: 100%; padding: 12px; background: #27ae60;
            color: white; border: none; border-radius: 8px; font-weight: bold;
        }

        /* --- COLUNAS --- */
        .kanban-board { display: flex; flex-direction: column; gap: 12px; }
        .column { background: var(--bg-column); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .column-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.03); }
        .column-title { font-weight: bold; font-size: 0.9rem; }
        
        /* ESTADO RECOLHIDO */
        .column.collapsed .card-container { display: none; }
        .column.collapsed { background: var(--bg-card); border: 1px solid var(--bg-column); }

        .card-container { padding: 10px; min-height: 60px; transition: background 0.2s; }
        .card-container.drag-over { background: rgba(52, 152, 219, 0.2); border-radius: 8px; }

        /* --- CARDS --- */
        .card {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent-color);
            position: relative;
            user-select: none;
            touch-action: none; /* Importante para o drag customizado */
        }
        
        /* Efeito visual ao arrastar */
        .card.is-dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .card-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 250px;
            opacity: 0.9;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transform: rotate(3deg);
        }

        .card h4 { font-size: 0.95rem; margin-bottom: 3px; }
        .card p { font-size: 0.8rem; color: var(--text-muted); }
        .date-badge { font-size: 0.6rem; display: block; opacity: 0.7; margin-top: 2px; }

        .btn-del { position: absolute; right: 8px; top: 8px; color: #e74c3c; border: none; background: none; font-size: 1.1rem; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: var(--bg-card); padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="color: white;">☰</button>
        <button class="nav-btn active" id="nav-kanban" onclick="switchView('kanban')">📋 <span>Quadro</span></button>
        <button class="nav-btn" id="nav-list" onclick="switchView('list')">📝 <span>Lista</span></button>
        <button class="nav-btn" onclick="toggleTheme()" style="margin-top: auto;">🌙 <span>Tema</span></button>
    </aside>

    <main class="main-content">
        <section id="kanban-view" class="view-section active">
            <form class="task-form" id="taskForm">
                <input type="text" id="taskName" placeholder="Atividade" required>
                <input type="text" id="taskReq" placeholder="Solicitante" required>
                <button type="submit" class="btn-add">Adicionar +</button>
            </form>

            <div class="kanban-board">
                <div class="column" id="col-Espera" data-status="Espera">
                    <div class="column-header">
                        <div class="column-title">📋 Espera</div>
                        <div class="column-actions">
                            <button onclick="openSettings('Espera')" style="background:none;border:none;">⚙️</button>
                            <button onclick="toggleColumn('Espera')" class="toggle-btn" style="background:none;border:none;margin-left:10px;">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>

                <div class="column" id="col-Andamento" data-status="Andamento">
                    <div class="column-header">
                        <div class="column-title">⏳ Andamento</div>
                        <div class="column-actions">
                            <button onclick="openSettings('Andamento')" style="background:none;border:none;">⚙️</button>
                            <button onclick="toggleColumn('Andamento')" class="toggle-btn" style="background:none;border:none;margin-left:10px;">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>

                <div class="column" id="col-Validacao" data-status="Validacao">
                    <div class="column-header">
                        <div class="column-title">👁️ Validação</div>
                        <div class="column-actions">
                            <button onclick="openSettings('Validacao')" style="background:none;border:none;">⚙️</button>
                            <button onclick="toggleColumn('Validacao')" class="toggle-btn" style="background:none;border:none;margin-left:10px;">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>

                <div class="column" id="col-Concluido" data-status="Concluido">
                    <div class="column-header">
                        <div class="column-title">✅ Concluído</div>
                        <div class="column-actions">
                            <button onclick="openSettings('Concluido')" style="background:none;border:none;">⚙️</button>
                            <button onclick="toggleColumn('Concluido')" class="toggle-btn" style="background:none;border:none;margin-left:10px;">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>
            </div>
        </section>

        <section id="list-view" class="view-section">
            <div id="accordionList" style="padding-bottom: 50px;"></div>
        </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>Cor da Coluna</h3>
            <input type="color" id="confBg" style="width:100%; height:50px; margin:15px 0;">
            <button class="btn-add" onclick="saveSettings()">Salvar</button>
            <button onclick="closeSettings()" style="width:100%; margin-top:10px; background:none; border:none;">Cancelar</button>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('k_tasks_v3')) || [];
        let theme = localStorage.getItem('k_theme') || 'light';
        let colSettings = JSON.parse(localStorage.getItem('k_col_settings')) || {};
        let collapsedCols = JSON.parse(localStorage.getItem('k_collapsed')) || [];

        // --- INICIALIZAÇÃO ---
        function init() {
            if (theme === 'dark') document.body.classList.add('dark-theme');
            renderKanban();
            applyColSettings();
            collapsedCols.forEach(id => {
                const el = document.getElementById('col-' + id);
                if(el) { el.classList.add('collapsed'); el.querySelector('.toggle-btn').innerText = '▼'; }
            });
        }

        // --- UI GERAL ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
            localStorage.setItem('k_theme', theme);
        }
        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            document.getElementById('nav-' + v).classList.add('active');
            if(v === 'list') renderList();
        }
        function toggleColumn(id) {
            const col = document.getElementById('col-' + id);
            const isCollapsed = col.classList.toggle('collapsed');
            col.querySelector('.toggle-btn').innerText = isCollapsed ? '▼' : '▲';
            if (isCollapsed) { if (!collapsedCols.includes(id)) collapsedCols.push(id); }
            else { collapsedCols = collapsedCols.filter(c => c !== id); }
            localStorage.setItem('k_collapsed', JSON.stringify(collapsedCols));
        }

        // --- TAREFAS ---
        document.getElementById('taskForm').onsubmit = function(e) {
            e.preventDefault();
            const now = new Date().toLocaleString('pt-BR');
            const t = {
                id: 't' + Date.now(),
                name: document.getElementById('taskName').value,
                req: document.getElementById('taskReq').value,
                status: 'Espera',
                notes: '',
                dateCreated: now, dateStarted: null, dateValidated: null, dateFinished: null
            };
            tasks.push(t);
            save(); renderKanban(); this.reset();
        };

        function save() { localStorage.setItem('k_tasks_v3', JSON.stringify(tasks)); }

        function renderKanban() {
            document.querySelectorAll('.card-container').forEach(c => c.innerHTML = '');
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = t.id;
                card.innerHTML = `
                    <button class="btn-del" onclick="delTask('${t.id}')">✕</button>
                    <h4>${t.name}</h4>
                    <p>👤 ${t.req}</p>
                    <div class="date-group">
                        <span class="date-badge">📅 Pedido: ${t.dateCreated}</span>
                        ${t.dateStarted ? `<span class="date-badge">⏳ Início: ${t.dateStarted}</span>` : ''}
                        ${t.dateValidated ? `<span class="date-badge">👁️ Val: ${t.dateValidated}</span>` : ''}
                        ${t.dateFinished ? `<span class="date-badge">✅ Fim: ${t.dateFinished}</span>` : ''}
                    </div>
                `;
                
                // Adiciona os eventos de toque para o Drag and Hold
                setupTouchEvents(card);

                const container = document.querySelector(`#col-${t.status} .card-container`);
                if (container) container.appendChild(card);
            });
            applyColSettings();
        }

        // --- MECÂNICA DE DRAG AND HOLD (MOBILE) ---
        let activeCard = null;
        let ghostCard = null;
        let startX, startY;

        function setupTouchEvents(card) {
            card.ontouchstart = function(e) {
                if (e.target.tagName === 'BUTTON') return; // Não arrasta se clicar no X
                
                activeCard = card;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;

                // Criar o "fantasma" do card após um pequeno delay (hold)
                ghostCard = card.cloneNode(true);
                ghostCard.classList.add('card-ghost');
                ghostCard.style.width = card.offsetWidth + 'px';
                
                document.body.appendChild(ghostCard);
                updateGhostPosition(touch.clientX, touch.clientY);
                card.classList.add('is-dragging');
            };

            card.ontouchmove = function(e) {
                if (!ghostCard) return;
                e.preventDefault(); // Previne scroll enquanto arrasta
                const touch = e.touches[0];
                updateGhostPosition(touch.clientX, touch.clientY);

                // Feedback visual nas colunas
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const col = targetEl?.closest('.column');
                document.querySelectorAll('.card-container').forEach(c => c.classList.remove('drag-over'));
                if (col) col.querySelector('.card-container').classList.add('drag-over');
            };

            card.ontouchend = function(e) {
                if (!ghostCard) return;
                
                const touch = e.changedTouches[0];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const col = targetEl?.closest('.column');

                if (col) {
                    const newStatus = col.dataset.status;
                    moveTaskLogic(card.id, newStatus);
                }

                // Limpeza
                document.body.removeChild(ghostCard);
                ghostCard = null;
                activeCard.classList.remove('is-dragging');
                document.querySelectorAll('.card-container').forEach(c => c.classList.remove('drag-over'));
            };
        }

        function updateGhostPosition(x, y) {
            if (ghostCard) {
                ghostCard.style.left = (x - 50) + 'px';
                ghostCard.style.top = (y - 50) + 'px';
            }
        }

        function moveTaskLogic(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if (task.status === newStatus) return;

            const now = new Date().toLocaleString('pt-BR');
            if (newStatus === 'Andamento' && !task.dateStarted) task.dateStarted = now;
            if (newStatus === 'Validacao') task.dateValidated = now;
            if (newStatus === 'Concluido' && !task.dateFinished) task.dateFinished = now;

            task.status = newStatus;
            save();
            renderKanban();
        }

        function delTask(id) {
            if(confirm('Excluir?')) { tasks = tasks.filter(t => t.id !== id); save(); renderKanban(); }
        }

        // --- CONFIG COLUNAS ---
        let editingCol = '';
        function openSettings(id) {
            editingCol = id;
            document.getElementById('confBg').value = colSettings[id] || '#ebedef';
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeSettings() { document.getElementById('modalOverlay').style.display = 'none'; }
        function saveSettings() {
            colSettings[editingCol] = document.getElementById('confBg').value;
            localStorage.setItem('k_col_settings', JSON.stringify(colSettings));
            applyColSettings(); closeSettings();
        }
        function applyColSettings() {
            Object.keys(colSettings).forEach(id => {
                const el = document.getElementById('col-' + id);
                if (el) el.style.backgroundColor = colSettings[id];
            });
        }

        init();
    </script>
</body>
</html>
