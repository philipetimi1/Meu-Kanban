<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kanban Pro Mobile</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-sidebar: #2c3e50;
            --bg-card: #ffffff;
            --bg-column: #ebedef;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-color: #3498db;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-sidebar: #000000;
            --bg-card: #1e1e1e;
            --bg-column: #252525;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 70px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            transition: width 0.3s;
        }
        .sidebar.expanded { width: 200px; align-items: flex-start; }
        .nav-btn {
            background: none; border: none; color: #bdc3c7; padding: 20px;
            cursor: pointer; width: 100%; display: flex; align-items: center; gap: 15px;
        }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar:not(.expanded) span { display: none; }
        .sidebar.expanded span { display: inline; font-weight: bold; }

        /* --- CONTEÚDO --- */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- FORMULÁRIO --- */
        .task-form {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .task-form input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 8px;
            background: var(--bg-body); color: var(--text-main); font-size: 16px;
        }
        .btn-add {
            width: 100%; padding: 12px; background: #27ae60;
            color: white; border: none; border-radius: 8px; font-weight: bold;
        }

        /* --- COLUNAS KANBAN --- */
        .kanban-board { display: flex; flex-direction: column; gap: 15px; }
        
        .column {
            background: var(--bg-column);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .column-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.03);
        }

        .column-title { font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .column-actions { display: flex; align-items: center; gap: 12px; }

        .btn-icon {
            background: none; border: none; cursor: pointer;
            font-size: 1.2rem; color: var(--text-main); opacity: 0.6;
            padding: 5px; display: flex; align-items: center; justify-content: center;
        }

        /* ESTADO RECOLHIDO */
        .column.collapsed .card-container {
            display: none;
        }
        .column.collapsed {
            background: var(--bg-card);
            border: 1px solid var(--bg-column);
        }

        .card-container { padding: 10px; min-height: 20px; }

        /* --- CARDS --- */
        .card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent-color);
            position: relative;
        }
        .card h4 { font-size: 1rem; margin-bottom: 5px; }
        .card p { font-size: 0.85rem; color: var(--text-muted); }
        .card .date { font-size: 0.7rem; margin-top: 8px; display: block; opacity: 0.7; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: #e74c3c; border: none; background: none; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: var(--bg-card); padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="nav-btn" onclick="toggleSidebar()">☰</button>
        <button class="nav-btn active" onclick="switchView('kanban')">📋 <span>Quadro</span></button>
        <button class="nav-btn" onclick="switchView('list')">📝 <span>Lista</span></button>
        <button class="nav-btn" onclick="toggleTheme()" style="margin-top: auto;">🌙 <span>Tema</span></button>
    </aside>

    <main class="main-content">
        <section id="kanban-view" class="view-section active">
            <form class="task-form" id="taskForm">
                <input type="text" id="taskName" placeholder="O que fazer?" required>
                <input type="text" id="taskReq" placeholder="Quem solicitou?" required>
                <button type="submit" class="btn-add">Adicionar +</button>
            </form>

            <div class="kanban-board">
                <!-- COLUNA ESPERA -->
                <div class="column" id="col-Espera">
                    <div class="column-header">
                        <div class="column-title">📋 Espera</div>
                        <div class="column-actions">
                            <button class="btn-icon" onclick="openSettings('Espera')">⚙️</button>
                            <button class="btn-icon toggle-btn" onclick="toggleColumn('Espera')">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>

                <!-- COLUNA ANDAMENTO -->
                <div class="column" id="col-Andamento">
                    <div class="column-header">
                        <div class="column-title">⏳ Andamento</div>
                        <div class="column-actions">
                            <button class="btn-icon" onclick="openSettings('Andamento')">⚙️</button>
                            <button class="btn-icon toggle-btn" onclick="toggleColumn('Andamento')">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>

                <!-- COLUNA CONCLUÍDO -->
                <div class="column" id="col-Concluido">
                    <div class="column-header">
                        <div class="column-title">✅ Concluído</div>
                        <div class="column-actions">
                            <button class="btn-icon" onclick="openSettings('Concluido')">⚙️</button>
                            <button class="btn-icon toggle-btn" onclick="toggleColumn('Concluido')">▲</button>
                        </div>
                    </div>
                    <div class="card-container"></div>
                </div>
            </div>
        </section>

        <section id="list-view" class="view-section">
            <div id="accordionList"></div>
        </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 style="margin-bottom:15px">Cor da Coluna</h3>
            <input type="color" id="confBg" style="width:100%; height:50px; border-radius:8px; border:none; margin-bottom:15px;">
            <button class="btn-add" onclick="saveSettings()">Salvar</button>
            <button onclick="closeSettings()" style="width:100%; margin-top:10px; background:none; border:none; color:var(--text-muted)">Cancelar</button>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('k_tasks')) || [];
        let theme = localStorage.getItem('k_theme') || 'light';
        let colSettings = JSON.parse(localStorage.getItem('k_col_settings')) || {};
        let collapsedCols = JSON.parse(localStorage.getItem('k_collapsed')) || [];

        function init() {
            if (theme === 'dark') document.body.classList.add('dark-theme');
            renderKanban();
            applyColSettings();
            // Aplica o estado de recolhido salvo
            collapsedCols.forEach(id => {
                const el = document.getElementById('col-' + id);
                if(el) {
                    el.classList.add('collapsed');
                    el.querySelector('.toggle-btn').innerText = '▼';
                }
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('expanded'); }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
            localStorage.setItem('k_theme', theme);
        }

        // FUNÇÃO DE RECOLHER COLUNA
        function toggleColumn(id) {
            const col = document.getElementById('col-' + id);
            const btn = col.querySelector('.toggle-btn');
            const isCollapsed = col.classList.toggle('collapsed');
            
            btn.innerText = isCollapsed ? '▼' : '▲';

            if (isCollapsed) {
                if (!collapsedCols.includes(id)) collapsedCols.push(id);
            } else {
                collapsedCols = collapsedCols.filter(c => c !== id);
            }
            localStorage.setItem('k_collapsed', JSON.stringify(collapsedCols));
        }

        document.getElementById('taskForm').onsubmit = function(e) {
            e.preventDefault();
            const t = {
                id: 't' + Date.now(),
                name: document.getElementById('taskName').value,
                req: document.getElementById('taskReq').value,
                status: 'Espera',
                date: new Date().toLocaleString('pt-BR')
            };
            tasks.push(t);
            save();
            renderKanban();
            this.reset();
        };

        function save() { localStorage.setItem('k_tasks', JSON.stringify(tasks)); }

        function renderKanban() {
            document.querySelectorAll('.card-container').forEach(c => c.innerHTML = '');
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="btn-del" onclick="delTask('${t.id}')">✕</button>
                    <h4>${t.name}</h4>
                    <p>👤 ${t.req}</p>
                    <span class="date">Criado: ${t.date}</span>
                    <select onchange="moveTask('${t.id}', this.value)" style="width:100%; margin-top:10px; padding:5px; border-radius:5px;">
                        <option value="Espera" ${t.status=='Espera'?'selected':''}>Espera</option>
                        <option value="Andamento" ${t.status=='Andamento'?'selected':''}>Andamento</option>
                        <option value="Concluido" ${t.status=='Concluido'?'selected':''}>Concluído</option>
                    </select>
                `;
                const container = document.querySelector(`#col-${t.status} .card-container`);
                if (container) container.appendChild(card);
            });
        }

        function moveTask(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            task.status = newStatus;
            save();
            renderKanban();
        }

        function delTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
            renderKanban();
        }

        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
            if(v === 'list') renderList();
        }

        let editingCol = '';
        function openSettings(id) {
            editingCol = id;
            document.getElementById('confBg').value = colSettings[id] || '#ebedef';
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeSettings() { document.getElementById('modalOverlay').style.display = 'none'; }
        function saveSettings() {
            colSettings[editingCol] = document.getElementById('confBg').value;
            localStorage.setItem('k_col_settings', JSON.stringify(colSettings));
            applyColSettings();
            closeSettings();
        }
        function applyColSettings() {
            Object.keys(colSettings).forEach(id => {
                const el = document.getElementById('col-' + id);
                if (el) el.style.backgroundColor = colSettings[id];
            });
        }

        init();
    </script>
</body>
</html>
